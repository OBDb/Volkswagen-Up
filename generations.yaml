generations:
  - name: "First Generation"
    start_year: 2011
    end_year: 2023
    description: "The Volkswagen Up (stylized as 'up!') is a city car produced from 2011 to 2023 by the Volkswagen Group. Built on the NSF (New Small Family) platform, it features a space-efficient design with a length of just 3.54 meters while maximizing interior space through a 2.42-meter wheelbase and wheels pushed to the corners. Initially available as a three-door, a five-door variant was added in 2012. The exterior design is characterized by clean, simple lines with a distinctive glass tailgate and minimalist detailing. Engine options center around small, efficient petrol engines, primarily 1.0-liter three-cylinder units with power outputs ranging from 60 to 90 horsepower, with a turbocharged TSI variant producing 115 hp. A fully electric e-Up was introduced in 2013, offering zero-emission urban mobility. The interior features a surprisingly spacious cabin for its exterior dimensions, with a straightforward dashboard design, and clever storage solutions. A significant facelift in 2016 updated the styling, technology, and powertrains. The Up GTI performance variant with 115 horsepower arrived in January 2018. The Up was produced at Volkswagen's Bratislava Plant in Slovakia from December 2011 to October 2023. Production also occurred in Brazil from February 2014 to 2021. The Up shares its platform with the Škoda Citigo and SEAT Mii, which are rebadged variants. The vehicle was discontinued in various markets at different times, including Europe and Latin America by 2023."
